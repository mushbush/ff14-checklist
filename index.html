<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Checklist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0eb;
      --card: #ffffff;
      --text: #1a1714;
      --text-mid: #5c564e;
      --text-light: #9e9689;
      --accent: #c8553d;
      --accent-light: rgba(200, 85, 61, 0.08);
      --green: #3a8a5c;
      --green-light: rgba(58, 138, 92, 0.08);
      --border: #e8e2da;
      --border-light: #f0ece6;
      --shadow-sm: 0 1px 3px rgba(26, 23, 20, 0.04);
      --shadow-md: 0 4px 16px rgba(26, 23, 20, 0.06);
      --shadow-lg: 0 8px 32px rgba(26, 23, 20, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; }

    /* ── 헤더 ── */
    .site-header {
      padding: 48px 24px 0;
      max-width: 1120px;
      margin: 0 auto;
      animation: fadeDown 0.6s ease;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 800;
      color: var(--text);
      margin-top: 8px;
      line-height: 1.2;
    }

    .header-sub {
      font-size: 14px;
      color: var(--text-light);
      font-weight: 300;
      margin-top: 8px;
    }

    /* ── 전체 달성률 ── */
    .total-progress {
      margin-top: 32px;
      padding: 24px 28px;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .tp-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .tp-label { font-size: 14px; font-weight: 600; color: var(--text-mid); }

    .tp-pct {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
    }

    .bar-bg {
      height: 10px;
      background: var(--border-light);
      border-radius: 100px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #e0845a);
      border-radius: 100px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      width: 0%;
    }

    .tp-stats {
      display: flex;
      gap: 24px;
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-light);
    }

    .tp-stats strong { color: var(--text-mid); font-weight: 600; }

    /* ── 카드 그리드 ── */
    .grid {
      max-width: 1120px;
      margin: 32px auto 0;
      padding: 0 24px 40px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; gap: 16px; }
      h1 { font-size: 28px; }
      .tp-pct { font-size: 24px; }
      .site-header { padding-top: 32px; }
    }

    /* ── 메인 카드 ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow 0.25s, transform 0.25s;
      animation: fadeUp 0.5s ease both;
    }

    .card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .card-hd {
      padding: 20px 22px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .card-hd:hover { background: var(--accent-light); }

    .card-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-icon { font-size: 20px; line-height: 1; }

    .card-title {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .chevron {
      width: 20px; height: 20px;
      color: var(--text-light);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
    }

    .card.shut > .card-hd .chevron { transform: rotate(-90deg); }

    .card-prog {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .card-bar {
      flex: 1; height: 6px;
      background: var(--border-light);
      border-radius: 100px;
      overflow: hidden;
    }

    .card-bar-fill {
      height: 100%;
      border-radius: 100px;
      background: var(--accent);
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .card.ok .card-bar-fill { background: var(--green); }

    .card-num {
      font-size: 12px; font-weight: 600;
      color: var(--text-light);
      min-width: 36px;
      text-align: right;
    }

    .card.ok .card-num { color: var(--green); }

    /* ── 카드 바디 (접기) ── */
    .card-bd {
      max-height: 5000px;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
      opacity: 1;
    }

    .card.shut > .card-bd { max-height: 0; opacity: 0; }

    /* ── 서브 카테고리 ── */
    .sub {
      margin: 0 14px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-light);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .sub:first-child { margin-top: 4px; }
    .sub:last-child { margin-bottom: 16px; }

    .sub.sub-ok { border-color: rgba(58, 138, 92, 0.2); }

    .sub-hd {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .sub-hd:hover { background: var(--border-light); }

    .sub-chevron {
      width: 16px; height: 16px;
      color: var(--text-light);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
    }

    .sub.shut .sub-chevron { transform: rotate(-90deg); }

    .sub-title {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-mid);
    }

    .sub-prog {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sub-bar {
      width: 48px;
      height: 4px;
      background: var(--border-light);
      border-radius: 100px;
      overflow: hidden;
    }

    .sub-bar-fill {
      height: 100%;
      border-radius: 100px;
      background: var(--accent);
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .sub.sub-ok .sub-bar-fill { background: var(--green); }

    .sub-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      min-width: 28px;
      text-align: right;
    }

    .sub.sub-ok .sub-num { color: var(--green); }

    /* ── 서브 바디 (접기) ── */
    .sub-bd {
      max-height: 2000px;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s;
      opacity: 1;
    }

    .sub.shut .sub-bd { max-height: 0; opacity: 0; }

    .clist { padding: 0 10px 10px; }

    .ci {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .ci:hover { background: var(--border-light); }

    .cb {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .ci:hover .cb { border-color: var(--accent); }

    .cb svg {
      width: 11px; height: 11px;
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.2s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .ci.done .cb {
      background: var(--green);
      border-color: var(--green);
    }

    .ci.done .cb svg { opacity: 1; transform: scale(1); }

    .cl {
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      transition: color 0.2s;
      line-height: 1.5;
    }

    .ci.done .cl {
      color: var(--text-light);
      text-decoration: line-through;
      text-decoration-color: rgba(158, 150, 137, 0.4);
    }

    /* ── 전체완료 배너 ── */
    .done-banner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px;
      display: none;
    }

    .done-banner.show { display: block; }

    .done-inner {
      text-align: center;
      padding: 28px;
      background: var(--green-light);
      border: 1px solid rgba(58,138,92,0.15);
      border-radius: var(--radius);
      animation: bounceIn 0.5s ease;
    }

    .done-inner .em { font-size: 36px; }
    .done-inner p { margin-top: 8px; font-size: 15px; font-weight: 600; color: var(--green); }

    .footer {
      text-align: center;
      padding: 32px 24px 48px;
      font-size: 11px;
      color: var(--text-light);
      font-weight: 300;
      opacity: 0.5;
    }

    /* ── 색상 설정 버튼 & 패널 ── */
    .color-toggle {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--card);
      box-shadow: var(--shadow-lg), 0 0 0 1px var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .color-toggle:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 32px rgba(26,23,20,0.14), 0 0 0 1px var(--border);
    }

    .color-toggle svg { width: 22px; height: 22px; color: var(--text-mid); }

    .color-panel {
      position: fixed;
      bottom: 88px;
      right: 28px;
      width: 240px;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      padding: 20px;
      z-index: 100;
      opacity: 0;
      transform: translateY(12px) scale(0.95);
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .color-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .color-panel-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
    }

    .color-presets {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 10px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .color-swatch:hover { transform: scale(1.12); }

    .color-swatch.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
    }

    .color-swatch.active::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    .color-custom-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-custom-row label {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 400;
      white-space: nowrap;
    }

    .color-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
    }

    .color-input-wrap input[type="color"] {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      padding: 0;
      background: none;
      -webkit-appearance: none;
    }

    .color-input-wrap input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .color-input-wrap input[type="color"]::-webkit-color-swatch { border: 1px solid rgba(0,0,0,0.1); border-radius: 5px; }

    .color-hex {
      font-size: 12px;
      color: var(--text-mid);
      font-family: monospace;
      font-weight: 600;
    }

    @media (max-width: 560px) {
      .color-toggle { bottom: 20px; right: 20px; width: 44px; height: 44px; }
      .color-panel { bottom: 76px; right: 20px; width: 220px; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(0.9); }
      60% { transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="site-header">
    <div class="brand">My Checklist</div>
    <h1>나의 달성 목록</h1>
    <p class="header-sub">항목을 체크하며 하나씩 달성해보세요. 진행 상황은 자동 저장됩니다.</p>

    <div class="total-progress">
      <div class="tp-header">
        <span class="tp-label">전체 달성률</span>
        <span class="tp-pct" id="tPct">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="tBar"></div></div>
      <div class="tp-stats" id="tStats"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="done-banner" id="doneBanner">
    <div class="done-inner">
      <span class="em">🎉</span>
      <p>모든 항목을 달성했어요! 정말 대단합니다!</p>
    </div>
  </div>

  <p class="footer">체크 데이터는 이 브라우저에만 저장되며, 다른 사람에게 절대 공유되지 않습니다.</p>

  <!-- 색상 설정 -->
  <button class="color-toggle" id="colorToggle" aria-label="배경색 변경">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  </button>

  <div class="color-panel" id="colorPanel">
    <div class="color-panel-title">배경색 선택</div>
    <div class="color-presets" id="colorPresets"></div>
    <div class="color-custom-row">
      <label>직접 선택</label>
      <div class="color-input-wrap">
        <input type="color" id="customColor" value="#f5f0eb">
        <span class="color-hex" id="colorHex">#f5f0eb</span>
      </div>
    </div>
  </div>
</div>

// ── localStorage 기반 개인 데이터 ──
const KEY = 'my-checklist-v2';
function load() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch { return {}; } }
function save(s) { localStorage.setItem(KEY, JSON.stringify(s)); }
let st = load();

const CHK = `<svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6.5 4.8 9.3 10 2.7"/></svg>`;
const CHEV = `<svg class="chevron" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 8 10 12 14 8"/></svg>`;
const SCHEV = `<svg class="sub-chevron" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 8 10 12 14 8"/></svg>`;

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

// 카테고리 전체 아이템 수 계산
function countCat(cat) {
  let done = 0, total = 0;
  cat.subs.forEach(sub => {
    const ss = st[sub.id] || {};
    sub.items.forEach((_, i) => { total++; if (ss[i]) done++; });
  });
  return { done, total };
}

function render() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  let tDone = 0, tAll = 0;

  DATA.forEach((cat, ci) => {
    const { done: catDone, total: catTotal } = countCat(cat);
    const catPct = catTotal ? Math.round((catDone / catTotal) * 100) : 0;
    const catOk = catDone === catTotal && catTotal > 0;
    tDone += catDone;
    tAll += catTotal;

    const cardShut = localStorage.getItem('shut-' + cat.id) === '1';
    const el = document.createElement('div');
    el.className = 'card' + (catOk ? ' ok' : '') + (cardShut ? ' shut' : '');
    el.style.animationDelay = (0.04 * ci) + 's';

    // 서브 카테고리 HTML 생성
    let subsHtml = '';
    cat.subs.forEach(sub => {
      const ss = st[sub.id] || {};
      const subDone = sub.items.filter((_, i) => ss[i]).length;
      const subPct = sub.items.length ? Math.round((subDone / sub.items.length) * 100) : 0;
      const subOk = subDone === sub.items.length && sub.items.length > 0;
      const subShut = localStorage.getItem('shut-' + sub.id) === '1';

      subsHtml += `
        <div class="sub${subOk ? ' sub-ok' : ''}${subShut ? ' shut' : ''}">
          <div class="sub-hd" data-sub="${sub.id}">
            ${SCHEV}
            <span class="sub-title">${esc(sub.title)}</span>
            <div class="sub-prog">
              <div class="sub-bar"><div class="sub-bar-fill" style="width:${subPct}%"></div></div>
              <span class="sub-num">${subDone}/${sub.items.length}</span>
            </div>
          </div>
          <div class="sub-bd">
            <div class="clist">
              ${sub.items.map((it, i) => `
                <div class="ci${ss[i] ? ' done' : ''}" data-sub="${sub.id}" data-i="${i}">
                  <div class="cb">${CHK}</div>
                  <span class="cl">${esc(it)}</span>
                </div>`).join('')}
            </div>
          </div>
        </div>`;
    });

    el.innerHTML = `
      <div class="card-hd" data-id="${cat.id}">
        <div class="card-row">
          <span class="card-icon">${cat.icon}</span>
          <span class="card-title">${esc(cat.title)}</span>
          ${CHEV}
        </div>
        <div class="card-prog">
          <div class="card-bar"><div class="card-bar-fill" style="width:${catPct}%"></div></div>
          <span class="card-num">${catPct}%</span>
        </div>
      </div>
      <div class="card-bd">
        ${subsHtml}
      </div>`;
    g.appendChild(el);
  });

  const tp = tAll ? Math.round((tDone / tAll) * 100) : 0;
  document.getElementById('tPct').textContent = tp + '%';
  document.getElementById('tBar').style.width = tp + '%';
  document.getElementById('tStats').innerHTML =
    `<span>완료 <strong>${tDone}</strong> / ${tAll}</span><span>카테고리 <strong>${DATA.length}</strong>개</span>`;

  document.getElementById('doneBanner').classList.toggle('show', tDone === tAll && tAll > 0);
}

document.getElementById('grid').addEventListener('click', e => {
  // 체크박스 토글
  const ci = e.target.closest('.ci');
  if (ci) {
    const { sub, i } = ci.dataset;
    if (!st[sub]) st[sub] = {};
    st[sub][i] = !st[sub][i];
    save(st);
    render();
    return;
  }

  // 서브 카테고리 접기/펴기
  const subHd = e.target.closest('.sub-hd');
  if (subHd) {
    const subEl = subHd.closest('.sub');
    subEl.classList.toggle('shut');
    localStorage.setItem('shut-' + subHd.dataset.sub, subEl.classList.contains('shut') ? '1' : '0');
    return;
  }

  // 메인 카드 접기/펴기
  const hd = e.target.closest('.card-hd');
  if (hd) {
    const card = hd.closest('.card');
    card.classList.toggle('shut');
    localStorage.setItem('shut-' + hd.dataset.id, card.classList.contains('shut') ? '1' : '0');
  }
});

render();

  { color: '#1a1e2e', name: '네이비' },
  { color: '#1e2a22', name: '포레스트' },
];

const BG_KEY = 'my-checklist-bg';
const presetGrid = document.getElementById('colorPresets');
const customInput = document.getElementById('customColor');
const hexLabel = document.getElementById('colorHex');
const panel = document.getElementById('colorPanel');
const toggle = document.getElementById('colorToggle');

PRESETS.forEach(p => {
  const s = document.createElement('div');
  s.className = 'color-swatch';
  s.style.background = p.color;
  s.title = p.name;
  s.dataset.color = p.color;
  if (isDark(p.color)) s.style.border = '2px solid rgba(255,255,255,0.15)';
  presetGrid.appendChild(s);
});

function isDark(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) < 128;
}

function applyBg(hex) {
  const dark = isDark(hex);
  document.documentElement.style.setProperty('--bg', hex);
  document.documentElement.style.setProperty('--card', dark ? '#2e2a25' : '#ffffff');
  document.documentElement.style.setProperty('--text', dark ? '#ede8e2' : '#1a1714');
  document.documentElement.style.setProperty('--text-mid', dark ? '#b0a99f' : '#5c564e');
  document.documentElement.style.setProperty('--text-light', dark ? '#857e76' : '#9e9689');
  document.documentElement.style.setProperty('--border', dark ? '#3e3a34' : '#e8e2da');
  document.documentElement.style.setProperty('--border-light', dark ? '#353128' : '#f0ece6');
  customInput.value = hex;
  hexLabel.textContent = hex;
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === hex);
  });
  localStorage.setItem(BG_KEY, hex);
}

presetGrid.addEventListener('click', e => {
  const s = e.target.closest('.color-swatch');
  if (s) applyBg(s.dataset.color);
});

customInput.addEventListener('input', e => applyBg(e.target.value));
toggle.addEventListener('click', () => panel.classList.toggle('open'));
document.addEventListener('click', e => {
  if (!panel.contains(e.target) && !toggle.contains(e.target)) panel.classList.remove('open');
});

const savedBg = localStorage.getItem(BG_KEY);
if (savedBg) applyBg(savedBg);
</script>
